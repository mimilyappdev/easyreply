<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホ タブ切替モック</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'BIZ UDGothic', 'Hiragino Sans', sans-serif;
    background: #E8E4DE;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 24px;
    padding: 24px 16px;
    flex-wrap: wrap;
  }

  /* ── スマホ枠 ── */
  .phone {
    width: 375px;
    height: 720px;
    background: #F5F1EB;
    border-radius: 40px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.22), inset 0 0 0 2px #ccc;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .phone-label {
    text-align: center;
    font-size: 12px;
    color: #7A8090;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 0.06em;
  }

  /* ── ヘッダー ── */
  .header {
    background: #2C4A5E;
    height: 52px;
    display: flex;
    align-items: center;
    padding: 0 16px;
    flex-shrink: 0;
  }
  .header-logo { color: #fff; font-size: 16px; font-weight: 700; }

  /* ── タブバー ── */
  .tab-bar {
    display: flex;
    background: #fff;
    border-bottom: 1.5px solid #DDD8D0;
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 11px 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    border: none;
    background: none;
    color: #9AA5B0;
    cursor: pointer;
    border-bottom: 2.5px solid transparent;
    margin-bottom: -1.5px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .tab-btn.active {
    color: #2C4A5E;
    border-bottom-color: #C8A030;
  }

  /* ── スクロールコンテンツ ── */
  .tab-content {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .tab-content.active { display: flex; }

  /* ── 左パネル風 ── */
  .section-card {
    background: #fff;
    border-radius: 10px;
    padding: 12px;
    border: 1px solid #DDD8D0;
  }
  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #9AA5B0;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .phase-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .phase-tab {
    padding: 5px 10px;
    font-size: 11px;
    border-radius: 99px;
    border: 1.5px solid #DDD8D0;
    background: #fff;
    color: #5A7A90;
    font-family: inherit;
    cursor: pointer;
  }
  .phase-tab.active {
    background: #2C4A5E;
    color: #fff;
    border-color: #2C4A5E;
  }
  .reply-btn {
    width: 100%;
    padding: 10px 12px;
    text-align: left;
    border: 1.5px solid #DDD8D0;
    border-radius: 8px;
    background: #fff;
    font-size: 12px;
    font-family: inherit;
    color: #2A2A2A;
    cursor: pointer;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .reply-btn.active {
    border-color: #3A7CA5;
    background: #E3EFF7;
    color: #1A3A52;
    font-weight: 700;
  }
  .reply-btn-icon { font-size: 14px; }

  /* ── 右パネル風 ── */
  .tone-row {
    display: flex;
    gap: 6px;
    margin-bottom: 2px;
  }
  .tone-btn {
    padding: 6px 14px;
    border-radius: 99px;
    font-size: 11px;
    font-family: inherit;
    border: 1.5px solid #DDD8D0;
    background: #fff;
    color: #5A7A90;
    cursor: pointer;
  }
  .tone-btn.active {
    background: #2C4A5E;
    color: #fff;
    border-color: #2C4A5E;
  }
  .preview-label {
    font-size: 10px;
    color: #9AA5B0;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .preview-textarea {
    width: 100%;
    height: 260px;
    border: 2px dashed #DDD8D0;
    border-radius: 10px;
    background: #fff;
    padding: 14px;
    font-size: 13px;
    font-family: inherit;
    line-height: 1.8;
    color: #2A2A2A;
    resize: none;
    outline: none;
  }
  .preview-textarea:focus { border-color: #3A7CA5; border-style: solid; }
  .action-row {
    display: flex;
    gap: 8px;
  }
  .btn-copy {
    flex: 1;
    padding: 12px;
    background: #3A6080;
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-reset {
    padding: 12px 14px;
    border: 1.5px solid #DDD8D0;
    background: #fff;
    border-radius: 9px;
    font-size: 12px;
    font-family: inherit;
    color: #6A7A8A;
    cursor: pointer;
  }

  /* ── ボトムナビ ── */
  .bottom-nav {
    display: flex;
    background: #fff;
    border-top: 1px solid #DDD8D0;
    padding: 8px 0 12px;
    flex-shrink: 0;
  }
  .bottom-nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: #9AA5B0;
  }
  .bottom-nav-item.active { color: #2C4A5E; }
  .bottom-nav-icon { font-size: 18px; }

  /* ── 凡例 ── */
  .note {
    width: 375px;
    font-size: 12px;
    color: #6A7A8A;
    line-height: 1.8;
    background: #fff;
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .note h3 { font-size: 13px; color: #2C4A5E; margin-bottom: 8px; }
</style>
</head>
<body>

<!-- ===== 画面1: テンプレ選択タブ ===== -->
<div>
  <div class="phone-label">TAB①「テンプレ選択」</div>
  <div class="phone">
    <div class="header"><span class="header-logo">EasyReply</span></div>

    <div class="tab-bar">
      <button class="tab-btn active">📋 テンプレ選択</button>
      <button class="tab-btn" onclick="switchPhone1()">✉️ プレビュー</button>
    </div>

    <div class="tab-content active" id="p1-tab1">
      <div class="section-card">
        <div class="section-label">フェーズ</div>
        <div class="phase-tabs">
          <button class="phase-tab active">受付</button>
          <button class="phase-tab">制作中</button>
          <button class="phase-tab">納品</button>
          <button class="phase-tab">決済</button>
        </div>
        <div class="section-label">返信タイプ</div>
        <button class="reply-btn active"><span class="reply-btn-icon">✅</span>受諾・見積案内</button>
        <button class="reply-btn"><span class="reply-btn-icon">💴</span>見積もり提示</button>
        <button class="reply-btn"><span class="reply-btn-icon">🙏</span>お断り</button>
        <button class="reply-btn"><span class="reply-btn-icon">⏸</span>保留・検討中</button>
      </div>
      <div class="section-card">
        <div class="section-label">追加一文</div>
        <div class="phase-tabs">
          <button class="phase-tab">実績公開確認</button>
          <button class="phase-tab">修正回数案内</button>
          <button class="phase-tab">納期注意</button>
        </div>
      </div>
    </div>

    <div class="tab-content" id="p1-tab2">
      <!-- プレビュータブ（空） -->
    </div>

    <div class="bottom-nav">
      <div class="bottom-nav-item active"><span class="bottom-nav-icon">✉️</span>返信</div>
      <div class="bottom-nav-item"><span class="bottom-nav-icon">⭐</span>お気に入り</div>
      <div class="bottom-nav-item"><span class="bottom-nav-icon">⚙️</span>設定</div>
    </div>
  </div>
</div>

<!-- ===== 画面2: プレビュータブ ===== -->
<div>
  <div class="phone-label">TAB②「プレビュー・コピー」</div>
  <div class="phone">
    <div class="header"><span class="header-logo">EasyReply</span></div>

    <div class="tab-bar">
      <button class="tab-btn" onclick="void(0)">📋 テンプレ選択</button>
      <button class="tab-btn active">✉️ プレビュー</button>
    </div>

    <div class="tab-content active">
      <div>
        <div class="tone-row">
          <button class="tone-btn active">Formal</button>
          <button class="tone-btn">Warm</button>
        </div>
      </div>
      <div class="section-card" style="flex:1">
        <div class="preview-label">返信プレビュー（直接編集できます）</div>
        <textarea class="preview-textarea">頂戴しました内容からお見積もりを作成いたしますので少々お待ちくださいませ。

3営業日程度でご返信しておりますが、お急ぎの場合は一言いただければ幸いです。</textarea>
      </div>
      <div class="action-row">
        <button class="btn-copy">📋 コピー</button>
        <button class="btn-reset">リセット</button>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="bottom-nav-item active"><span class="bottom-nav-icon">✉️</span>返信</div>
      <div class="bottom-nav-item"><span class="bottom-nav-icon">⭐</span>お気に入り</div>
      <div class="bottom-nav-item"><span class="bottom-nav-icon">⚙️</span>設定</div>
    </div>
  </div>
</div>

<!-- ===== 説明 ===== -->
<div class="note">
  <h3>変更内容（スマホのみ）</h3>
  ・画面上部に「テンプレ選択」「プレビュー」タブを追加<br>
  ・テンプレ選択タブ：現状の左パネルをフル幅で表示<br>
  ・プレビュータブ：テキストエリアをフル幅・十分な高さで表示<br>
  ・PC表示（幅600px以上）は現状のまま変更なし<br>
  ・ボトムナビは今後の拡張用（今回は表示のみ・機能は変えない）
</div>

</body>
</html>
